<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FlashLight Pro</title>
    <meta name="description" content="A professional, installable Progressive Web App for advanced flashlight control.">
    <meta name="keywords" content="flashlight, PWA, torch, strobe, SOS, emergency">
    <meta name="theme-color" content="#0f172a">
    <link rel="canonical" href="https://yourdomain.com/">
    
    <!-- Icons & Manifest -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="FlashLight Pro">
    <meta property="og:description" content="Advanced PWA flashlight with SOS, Strobe, and Timer modes.">
    <meta property="og:image" content="screenshots/desktop.png">
    <meta property="og:url" content="https://yourdomain.com/">
    <meta property="og:type" content="website">
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FlashLight Pro">
    <meta name="twitter:description" content="Advanced PWA flashlight with SOS, Strobe, and Timer modes.">
    <meta name="twitter:image" content="screenshots/mobile.png">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FlashLight Pro",
      "url": "https://yourdomain.com/",
      "description": "Professional Progressive Web App flashlight.",
      "applicationCategory": "Utility",
      "operatingSystem": "All"
    }
    </script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="glass">
        <div class="logo-container">
            <h1>FlashLight Pro</h1>
        </div>
        <nav>
            <button id="btn-settings" aria-label="Settings" class="icon-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </nav>
    </header>

    <main>
        <section id="status-panel" class="glass card">
            <h2 id="torch-status">Status: OFF</h2>
            <p id="error-message" class="error hidden" aria-live="polite"></p>
            <div class="battery-saver-indicator hidden" id="battery-indicator">Battery Saver Active</div>
        </section>

        <section id="main-controls">
            <button id="btn-power" class="power-btn ripple" aria-label="Toggle Flashlight">
                <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2" fill="none"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
            </button>
        </section>

        <section id="mode-controls" class="glass card grid">
            <button class="mode-btn ripple" data-mode="steady">Steady</button>
            <button class="mode-btn ripple" data-mode="blink-fast">Fast Blink</button>
            <button class="mode-btn ripple" data-mode="blink-slow">Slow Blink</button>
            <button class="mode-btn ripple" data-mode="sos">SOS</button>
            <button class="mode-btn ripple" data-mode="strobe">Strobe</button>
            <button class="mode-btn ripple" data-mode="beacon">Beacon</button>
        </section>

        <section id="timer-controls" class="glass card">
            <h3>Auto-Off Timer <span id="timer-display"></span></h3>
            <div class="grid timer-grid">
                <button class="timer-btn ripple" data-time="30">30s</button>
                <button class="timer-btn ripple" data-time="60">1m</button>
                <button class="timer-btn ripple" data-time="120">2m</button>
                <button class="timer-btn ripple" data-time="300">5m</button>
                <button class="timer-btn ripple" data-time="600">10m</button>
                <button class="timer-btn ripple" data-time="900">15m</button>
                <button class="timer-btn ripple cancel-timer hidden" id="btn-cancel-timer">Cancel</button>
            </div>
        </section>
    </main>

    <footer class="glass">
        <p>&copy; 2026 FlashLight Pro. <button id="btn-about" class="text-btn">About</button></p>
    </footer>

    <!-- Settings Dialog -->
    <dialog id="settings-dialog" class="glass-dialog">
        <div class="dialog-content">
            <h2>Settings</h2>
            <div class="setting-item">
                <label for="theme-toggle">Theme Mode</label>
                <button id="theme-toggle" class="ripple">Toggle Dark/Light</button>
            </div>
            <div class="setting-item">
                <label for="sound-toggle">Sound Feedback</label>
                <input type="checkbox" id="sound-toggle" checked>
            </div>
            <div class="setting-item">
                <label for="vibration-toggle">Vibration Feedback</label>
                <input type="checkbox" id="vibration-toggle" checked>
            </div>
            <div class="setting-item">
                <label for="wakelock-toggle">Keep Screen Awake</label>
                <input type="checkbox" id="wakelock-toggle" checked>
            </div>
            <div class="dialog-actions">
                <button id="btn-close-settings" class="ripple btn-primary">Close</button>
            </div>
        </div>
    </dialog>

    <!-- Permission Dialog -->
    <dialog id="permission-dialog" class="glass-dialog">
        <div class="dialog-content">
            <h2>Camera Permission Required</h2>
            <p>FlashLight Pro requires camera access to operate your device's LED flash. No photos or videos are captured or stored.</p>
            <div class="dialog-actions">
                <button id="btn-grant-permission" class="ripple btn-primary">Grant Permission</button>
            </div>
        </div>
    </dialog>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
